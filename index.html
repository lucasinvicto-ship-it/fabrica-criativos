  function buildPanel(app){
    var panel = document.createElement("section");
    panel.className = "panel" + (app.id===state.activeId ? " active" : "");
    var draft = app.draft;

    // ---- fixed page header (matches "Fábrica de Criativos" reference) ----
    var pageHead = document.createElement("div");
    pageHead.className = "fabrica-head";
    pageHead.innerHTML =
      '<h1>Fábrica de Criativos</h1>' +
      '<p class="hint" style="margin-top:2px">Descreva o objetivo → gera copy + arte em lote → você aprova → sobe na campanha (PAUSED).</p>' +
      '<button type="button" class="collapsible-bar" id="costBarBtn">💰 <strong>Custo de IA</strong> · hoje $0,00 (sem teto) · 30d: $0,00 <span class="chev">▾</span></button>' +
      '<div class="collapsible-body" id="costBarBody" style="display:none">Esse projeto usa o motor "Templates (fixo)" — geração 100% local, sem chamada de IA, então o custo é sempre $0.</div>' +
      '<button type="button" class="collapsible-bar" id="howBarBtn">Como funciona? <span class="chev">▾</span></button>' +
      '<div class="collapsible-body" id="howBarBody" style="display:none">' +
        'Preenche o briefing (ou usa um modelo pronto) → cola as linhas de Hook | Corpo | CTA → clica "Gerar lote" → revisa na galeria (Ativos/Rejeitados/Utilizados) → baixa imagem ou vídeo do que aprovar.' +
      '</div>';
    panel.appendChild(pageHead);
    pageHead.querySelector("#costBarBtn").addEventListener("click", function(){
      var body = pageHead.querySelector("#costBarBody");
      body.style.display = body.style.display==="none" ? "block" : "none";
    });
    pageHead.querySelector("#howBarBtn").addEventListener("click", function(){
      var body = pageHead.querySelector("#howBarBody");
      body.style.display = body.style.display==="none" ? "block" : "none";
    });

    // head + settings (store only — color now lives per creative)
    var head = document.createElement("div");
    head.className = "app-head";
    var isAppType = app.settings.visualType!=="cash";
    head.innerHTML =
      '<label class="hint" style="margin:0">Projeto:</label>' +
      '<input class="app-name" value="'+xmlEscape(app.name)+'" aria-label="Nome do projeto" />' +
      '<div class="settings-inline">' +
        (isAppType ? '<div class="settings-field"><label style="margin-right:2px">Loja</label><select id="storeSel">' +
          ["Google Play","App Store"].map(function(s){ return '<option'+(app.settings.store===s?" selected":"")+'>'+s+'</option>'; }).join("") +
        '</select></div>' : '') +
        '<button type="button" class="btn-sm" id="dupAppBtn">Duplicar projeto</button>' +
      '</div>';
    panel.appendChild(head);

    var nameInput = head.querySelector(".app-name");
    nameInput.addEventListener("input", function(){ app.name=nameInput.value; save(); renderTabs(); });
    var storeSelEl = head.querySelector("#storeSel");
    if(storeSelEl) storeSelEl.addEventListener("change", function(e){ app.settings.store = e.target.value; save(); renderPanels(); });
    head.querySelector("#dupAppBtn").addEventListener("click", function(){
      var newName = prompt('Nome do novo projeto (baseado em "'+app.name+'"):', app.name+" (cópia)");
      if(!newName || !newName.trim()) return;
      var clone = JSON.parse(JSON.stringify(app));
      clone.id = uid("app");
      clone.name = newName.trim();
      clone.photoLibrary = [];
      clone.externalCreatives = [];
      clone.creatives.forEach(function(c){ c.id = uid("cre"); c.status = "testando"; c.photo = null; });
      state.apps.push(clone);
      state.activeId = clone.id;
      save();
      render();
    });

    // ---- creator: bulk paste + shared fallback fields + photo library + live preview ----
    var creator = document.createElement("div");
    creator.className = "creator";

    var nextColorSample = nextColor(app);
    var formCard = document.createElement("div");
    formCard.className = "form-card briefing-card";
    formCard.innerHTML =
      '<div class="briefing-label">BRIEFING</div>' +
      '<label>Modelos de briefing · preenche o objetivo e os campos — troque [NOME DO APP] e escolha marca/idioma (edite ou crie os seus em Templates)</label>' +
      '<div class="briefing-templates">' +
        state.templates.map(function(t){
          return '<button type="button" class="config-chip" data-tpl="'+t.id+'">'+xmlEscape(t.icon||"📝")+' '+xmlEscape(t.label)+'</button>';
        }).join("") +
      '</div>' +
      '<label style="margin-top:14px">Objetivo da campanha</label>' +
      '<textarea id="fObjetivo" rows="3" placeholder="Descreva o público, a oferta e o objetivo da campanha...">'+xmlEscape(draft.objetivo||"")+'</textarea>' +
      '<div class="shared-fields">' +
        '<div><label>Marca (estampa)</label><input id="fCardName" placeholder="'+xmlEscape(app.name)+'" value="'+xmlEscape(draft.cardName||"")+'" /></div>' +
        '<div><label>Qtd. de criativos</label><input id="fQtd" type="number" min="1" max="'+MAX_CREATIVES+'" value="'+MAX_CREATIVES+'" /></div>' +
        '<div><label>App (opcional)</label><select id="fAppSel"><option>— nenhum —</option></select></div>' +
        '<div><label>Badge Google Play</label><select id="fBadgeSel"><option>Auto (detecta app)</option><option>Sempre</option><option>Nunca</option></select></div>' +
        '<div><label>Motor de arte</label><select id="fMotorSel" disabled><option>Templates (fixo, $0)</option></select>' +
          '<div class="hint">Geração por IA (variação máxima) entra numa próxima etapa — por ora é sempre templates fixos, sem custo.</div></div>' +
        '<div><label>Idioma dos textos</label><input value="'+(app.settings.locale==="es-MX"?"Español (MX)":"Português (BR)")+'" disabled /></div>' +
      '</div>' +
      '<div class="briefing-divider">Cole abaixo o Hook | Corpo | CTA de cada criativo (uma linha por criativo):</div>' +
      '<label>Uma combinação por linha. Só o hook funciona (usa os campos abaixo como padrão), ou cole <code>Hook | Corpo | CTA</code> — aceita colar direto de planilha. Cada linha vira um criativo com cor E formato de layout diferentes automaticamente.</label>' +
      '<textarea id="fBulk" class="bulk-textarea">'+xmlEscape(draft.bulk)+'</textarea>' +
      '<div class="shared-fields">' +
        '<div class="full"><label>Corpo padrão — 1ª linha é o subtítulo, as demais viram os selos de confiança</label><textarea id="fCorpo" rows="3">'+xmlEscape(draft.corpo)+'</textarea></div>' +
        '<div><label>Valor</label><input id="fValor" value="'+xmlEscape(draft.valor)+'" /></div>' +
        '<div><label>CTA padrão</label><input id="fCta" value="'+xmlEscape(draft.cta)+'" /></div>' +
      '</div>' +
      '<div class="compliance-warn" id="complianceWarn" style="display:none"></div>' +
      '<div class="form-actions"><button type="button" class="btn-primary gen-lote-btn" id="genBtn">Gerar lote</button><span class="hint" id="capHint"></span></div>';
    var leftCol = document.createElement("div");
    leftCol.className = "creator-left-col";
    creator.appendChild(leftCol);
    leftCol.appendChild(formCard);

    var fObjetivo = formCard.querySelector("#fObjetivo");
    fObjetivo.addEventListener("input", function(){ draft.objetivo = fObjetivo.value; save(); });
    formCard.querySelectorAll("[data-tpl]").forEach(function(btn){
      btn.addEventListener("click", function(){
        var t = state.templates.filter(function(tt){ return tt.id===btn.getAttribute("data-tpl"); })[0];
        if(!t) return;
        fObjetivo.value = t.objetivo;
        formCard.querySelector("#fBulk").value = t.bulk;
        formCard.querySelector("#fCorpo").value = t.corpo;
        formCard.querySelector("#fValor").value = t.valor;
        formCard.querySelector("#fCta").value = t.cta;
        draft.objetivo = t.objetivo; draft.bulk = t.bulk; draft.corpo = t.corpo; draft.valor = t.valor; draft.cta = t.cta;
        save();
        formCard.querySelector("#fBulk").dispatchEvent(new Event("input"));
      });
    });

    var photoLibraryBlock = document.createElement("div");
    photoLibraryBlock.className = "form-card";
    photoLibraryBlock.style.marginTop = "18px";
    var aiPhotoDefaultPrompt = (app.settings.visualType==="cash")
      ? "Realistic professional advertising photo, excited Brazilian person celebrating a win, casino and betting app theme, neon lights, vibrant colors, high quality photography, no text"
      : "Realistic professional advertising photo, happy Brazilian person using a smartphone banking app, modern lifestyle, natural lighting, high quality photography, no text";
    photoLibraryBlock.innerHTML =
      '<div class="briefing-label">ENVIAR IMAGENS PRÓPRIAS</div>' +
      '<p class="hint">Suas imagens viram criativos na galeria — gere o vídeo depois no botão 🎬 de cada card. Elas se repetem entre os criativos do lote se houver menos fotos que linhas.</p>' +
      '<input type="file" id="fPhotoAdd" accept="image/*" multiple />' +
      '<div class="lib-row" id="libRow"></div>' +
      '<div class="briefing-divider">Ou gere uma foto com IA (100% grátis, sem cadastro — Pollinations.ai / Flux)</div>' +
      '<textarea id="fAiPhotoPrompt" rows="2" placeholder="Descreva a foto em inglês pra melhor resultado...">'+xmlEscape(aiPhotoDefaultPrompt)+'</textarea>' +
      '<div class="form-actions" style="margin-top:8px"><button type="button" class="btn-sm" id="fAiPhotoBtn">🎨 Gerar foto com IA</button><span class="hint" id="fAiPhotoHint"></span></div>';
    leftCol.appendChild(photoLibraryBlock);

    var previewCard = document.createElement("div");
    previewCard.className = "preview-card";
    previewCard.innerHTML = '<div class="preview-poster" id="livePreview"></div><div class="preview-label">Pré-visualização — 1ª linha do lote · formato "'+layoutLabel(nextLayout(app))+'"</div>';
    creator.appendChild(previewCard);

    panel.appendChild(creator);

    var fBulk = formCard.querySelector("#fBulk"), fCorpo = formCard.querySelector("#fCorpo"),
        fValor = formCard.querySelector("#fValor"), fCta = formCard.querySelector("#fCta"),
        fCardName = formCard.querySelector("#fCardName");
    var liveEl = previewCard.querySelector("#livePreview");
    var nextLayoutSample = nextLayout(app);
    function updatePreview(){
      var firstLine = fBulk.value.split("\n").map(function(s){ return s.trim(); }).filter(Boolean)[0] || "";
      var parsed = parseBulkLine(firstLine, fCorpo.value, fCta.value);
      var photo = app.photoLibrary.length ? app.photoLibrary[0] : null;
      liveEl.innerHTML = buildPosterSVG(app, { hook: parsed.hook, corpo: parsed.corpo, valor: fValor.value, cta: parsed.cta, photo: photo, photoZoom:100, photoOffsetX:0, photoOffsetY:0, color: nextColorSample, cardName: fCardName.value, layout: nextLayoutSample });
    }
    var complianceWarnEl = formCard.querySelector("#complianceWarn");
    function updateComplianceWarning(){
      var hits = findComplianceHits(fBulk.value+" "+fCorpo.value+" "+fCardName.value);
      if(hits.length){
        complianceWarnEl.style.display = "block";
        complianceWarnEl.innerHTML = "⚠️ <strong>Atenção:</strong> detectei referência a " +
          hits.map(function(h){ return "\""+xmlEscape(h)+"\""; }).join(", ") +
          " no texto. Usar nome de banco/fintech de terceiros ou de programa do governo (Bolsa Família, Auxílio, INSS, FGTS etc.) pra parecer que seu projeto tem relação com eles é enganoso e derruba conta no Meta. Troca por linguagem genérica antes de gerar.";
      } else {
        complianceWarnEl.style.display = "none";
        complianceWarnEl.innerHTML = "";
      }
    }

    [fBulk,fCorpo,fValor,fCta,fCardName].forEach(function(el){ el.addEventListener("input", function(){
      draft.bulk=fBulk.value; draft.corpo=fCorpo.value; draft.valor=fValor.value; draft.cta=fCta.value; draft.cardName=fCardName.value; save(); updatePreview(); updateComplianceWarning();
    }); });

    // photo library
    var libRow = photoLibraryBlock.querySelector("#libRow");
    function renderLib(){
      libRow.innerHTML = "";
      app.photoLibrary.forEach(function(url, i){
        var t = document.createElement("div");
        t.className = "lib-thumb";
        t.innerHTML = '<img src="'+url+'" alt="foto '+i+'" /><button type="button" class="lib-rm" aria-label="Remover foto">✕</button>';
        t.querySelector(".lib-rm").addEventListener("click", function(){
          app.photoLibrary.splice(i,1); save(); renderLib(); updatePreview();
        });
        libRow.appendChild(t);
      });
    }
    renderLib();
    photoLibraryBlock.querySelector("#fPhotoAdd").addEventListener("change", function(e){
      var files = Array.from(e.target.files||[]);
      if(!files.length) return;
      Promise.all(files.map(fileToDataUrl)).then(function(urls){
        app.photoLibrary = app.photoLibrary.concat(urls); save(); renderLib(); updatePreview();
        e.target.value = "";
      });
    });

    var aiPhotoBtn = photoLibraryBlock.querySelector("#fAiPhotoBtn");
    var aiPhotoHint = photoLibraryBlock.querySelector("#fAiPhotoHint");
    aiPhotoBtn.addEventListener("click", function(){
      var prompt = photoLibraryBlock.querySelector("#fAiPhotoPrompt").value.trim();
      if(!prompt){ aiPhotoHint.textContent = "Descreve a foto primeiro."; return; }
      aiPhotoBtn.disabled = true;
      aiPhotoBtn.textContent = "Gerando... (pode levar alguns segundos)";
      aiPhotoHint.textContent = "";
      fetch("/api/generate-photo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: prompt })
      }).then(function(r){
        return r.json().then(function(data){
          if(!r.ok) throw new Error(data.error || ("Erro "+r.status));
          return data;
        });
      }).then(function(data){
        app.photoLibrary.push(data.imageDataUrl);
        save(); renderLib(); updatePreview();
        aiPhotoHint.textContent = "✓ Foto gerada e adicionada à biblioteca.";
      }).catch(function(err){
        console.error(err);
        aiPhotoHint.textContent = "Erro: "+(err.message||err)+" — se estiver testando no Artifact (claude.ai), isso só funciona no site hospedado de verdade.";
      }).then(function(){
        aiPhotoBtn.disabled = false;
        aiPhotoBtn.textContent = "🎨 Gerar foto com IA";
      });
    });

    updatePreview();
    updateComplianceWarning();

    var genBtn = formCard.querySelector("#genBtn");
    var capHint = formCard.querySelector("#capHint");
    if(app.creatives.length>=MAX_CREATIVES){
      genBtn.disabled = true;
      capHint.textContent = "Limite de "+MAX_CREATIVES+" atingido — remova um do lote abaixo pra gerar outro.";
    }
    genBtn.addEventListener("click", function(){
      var room = MAX_CREATIVES - app.creatives.length;
      if(room<=0) return;
      var qtdWanted = parseInt(formCard.querySelector("#fQtd").value, 10) || MAX_CREATIVES;
      var cap = Math.min(room, qtdWanted);
      var lines = fBulk.value.split("\n").map(function(s){ return s.trim(); }).filter(Boolean).slice(0, cap);
      lines.forEach(function(line, i){
        var parsed = parseBulkLine(line, fCorpo.value, fCta.value);
        var color = nextColor(app);
        var layout = nextLayout(app);
        var photo = app.photoLibrary.length ? app.photoLibrary[i % app.photoLibrary.length] : null;
        app.creatives.push(seedCreative(parsed.hook, parsed.corpo, fValor.value, parsed.cta, photo, color, fCardName.value, layout));
      });
      save(); renderPanels();
    });

    // ---- vídeo narrado (preferências do lote) ----
    function buildNarrationBlock(app, idSuffix){
      idSuffix = idSuffix || "";
      var narrationBlock = document.createElement("section");
      narrationBlock.className = "block";
      var curLang = app.settings.narrationLanguage || (app.settings.locale==="es-MX" ? "es-MX" : "pt-BR");
      narrationBlock.innerHTML =
        '<div class="block-head"><span class="block-title">🎙️ Vídeo narrado</span>' +
        '<span class="block-sub">preferências do lote — se o site estiver hospedado com a chave do ElevenLabs configurada, a narração é gerada automática</span></div>' +
        '<div class="shared-fields" style="margin-top:10px">' +
          '<div><label>Idioma da narração</label><select id="narrLangSel'+idSuffix+'">' +
            NARRATION_LANGUAGES.map(function(l){ return '<option value="'+l.code+'"'+(curLang===l.code?" selected":"")+'>'+xmlEscape(l.label)+'</option>'; }).join("") +
          '</select></div>' +
          '<div><label>Voz (rótulo, só pra lembrar)</label><input id="narrVoiceLabel'+idSuffix+'" placeholder="Ex: Feminina — calma" value="'+xmlEscape(app.settings.narrationVoiceLabel||"")+'" /></div>' +
          '<div><label>Voice ID do ElevenLabs</label><input id="narrVoiceId'+idSuffix+'" placeholder="Ex: 21m00Tcm4TlvDq8ikWAM" value="'+xmlEscape(app.settings.narrationVoiceId||"")+'" /></div>' +
          '<div><label>Formato do vídeo/GIF</label><select id="narrFormatSel'+idSuffix+'">' +
            '<option value="story"'+(app.settings.videoFormat!=="square"?" selected":"")+'>Story (1080×1920)</option>' +
            '<option value="square"'+(app.settings.videoFormat==="square"?" selected":"")+'>Quadrado (1080×1080)</option>' +
          '</select></div>' +
        '</div>';
      narrationBlock.querySelector("#narrLangSel"+idSuffix).addEventListener("change", function(e){
        app.settings.narrationLanguage = e.target.value; save();
      });
      narrationBlock.querySelector("#narrVoiceLabel"+idSuffix).addEventListener("input", function(e){
        app.settings.narrationVoiceLabel = e.target.value; save();
      });
      narrationBlock.querySelector("#narrVoiceId"+idSuffix).addEventListener("input", function(e){
        app.settings.narrationVoiceId = e.target.value.trim(); save();
      });
      narrationBlock.querySelector("#narrFormatSel"+idSuffix).addEventListener("change", function(e){
        app.settings.videoFormat = e.target.value; save();
      });
      return narrationBlock;
    }
    panel.appendChild(buildNarrationBlock(app, ""));

    // ---- gallery ----
    var galleryBlock = document.createElement("section");

    var hasPausados = app.creatives.some(function(c){ return c.status==="pausado"; });
    var activeReviewTab = reviewTabByApp[app.id] || "ativo";
    reviewTabByApp[app.id] = activeReviewTab;
    galleryBlock.innerHTML =
      '<div class="block-head"><span class="block-title">Galeria — '+app.creatives.length+' criativo'+(app.creatives.length===1?"":"s")+'</span>' +
      '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">' +
        '<span class="block-sub">cada um com sua própria cor e foto — edite sem afetar os outros</span>' +
        (app.creatives.length>0 ? '<select id="statusFilterSel" style="width:auto">' +
          '<option value="todos">Ver: Todos</option>' +
          CREATIVE_STATUSES.map(function(s){ return '<option value="'+s+'">Ver: '+creativeStatusLabel(s)+'</option>'; }).join("") +
        '</select>' : '') +
        (hasPausados ? '<button type="button" class="btn-sm" id="rmPausadosBtn">Remover pausados</button>' : '') +
        (app.creatives.length>0 ? '<button type="button" class="btn-sm" id="batchVideoBtn">🎬 Gerar vídeos do lote</button>' : '') +
        (app.creatives.length>0 ? '<button type="button" class="btn-sm" id="batchDlVideosBtn">Baixar vídeos (.zip)</button>' : '') +
        (app.creatives.length>0 ? '<button type="button" class="btn-sm" id="batchGifBtn">🖼️ Gerar GIFs do lote</button>' : '') +
        (app.creatives.length>0 ? '<button type="button" class="btn-sm" id="batchDlGifsBtn">Baixar GIFs (.zip)</button>' : '') +
        (app.creatives.length>0 ? '<button type="button" class="btn-primary btn-sm" id="batchDlBtn">Baixar Story (.zip)</button>' : '') +
        (app.creatives.length>0 ? '<button type="button" class="btn-sm" id="batchDlSquareBtn">📐 Baixar Quadrado (.zip)</button>' : '') +
      '</div></div>';
    if(app.creatives.length===0){
      var empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "Nenhum criativo no lote ainda. Ajuste as linhas acima e clique em \"Gerar lote\".";
      galleryBlock.appendChild(empty);
    } else {
      var reviewTabsBlock = document.createElement("div");
      reviewTabsBlock.innerHTML =
        '<div class="review-tabs" id="reviewTabs">' +
          REVIEW_STATUSES.map(function(s){
            var cnt = app.creatives.filter(function(c){ return c.reviewStatus===s; }).length;
            return '<button type="button" class="review-tab-btn'+(s===activeReviewTab?" active":"")+'" data-tab="'+s+'">'+reviewStatusLabel(s)+' <span class="cnt">'+cnt+'</span></button>';
          }).join("") +
        '</div>' +
        '<div class="review-hint">Rejeitar move o criativo pra "Rejeitados"; aprovar move pra "Utilizados". A aba "Ativos" fica só com o que falta revisar.</div>' +
        '<div class="bulk-bar" id="bulkBar">' +
          '<span>Ação em massa: <span class="bulk-count" id="bulkCount">0</span> selecionado(s)</span>' +
          '<button type="button" class="link-btn" id="selectAllBtn">selecionar todos</button>' +
          '<button type="button" class="link-btn" id="clearSelBtn">limpar</button>' +
          '<div class="bulk-actions">' +
            '<button type="button" class="btn-approve" id="bulkApproveBtn">✓ Aprovar</button>' +
            '<button type="button" class="btn-reject" id="bulkRejectBtn">✗ Rejeitar</button>' +
          '</div>' +
        '</div>';
      galleryBlock.appendChild(reviewTabsBlock);

      var gallery = document.createElement("div");
      gallery.className = "gallery";
      var selection = getGallerySelection(app.id);
      function updateBulkBar(){
        var bulkCount = galleryBlock.querySelector("#bulkCount");
        if(bulkCount) bulkCount.textContent = selection.size;
      }
      app.creatives.forEach(function(cre){ gallery.appendChild(buildCard(app, cre, updateBulkBar)); });
      galleryBlock.appendChild(gallery);
      updateBulkBar();

      var statusFilterSel = galleryBlock.querySelector("#statusFilterSel");
      function applyGalleryFilters(){
        var statusVal = statusFilterSel ? statusFilterSel.value : "todos";
        var tabVal = reviewTabByApp[app.id] || "ativo";
        Array.from(gallery.children).forEach(function(cardEl, i){
          var cre = app.creatives[i];
          var passStatus = (statusVal==="todos" || cre.status===statusVal);
          var passTab = (cre.reviewStatus===tabVal);
          cardEl.style.display = (passStatus && passTab) ? "" : "none";
        });
      }
      applyGalleryFilters();
      statusFilterSel.addEventListener("change", applyGalleryFilters);

      reviewTabsBlock.querySelectorAll(".review-tab-btn").forEach(function(btn){
        btn.addEventListener("click", function(){
          reviewTabByApp[app.id] = btn.dataset.tab;

          applyGalleryFilters();

      galleryBlock.querySelector("#selectAllBtn").addEventListener("click", function(){
        Array.from(gallery.children).forEach(function(cardEl, i){
          if(cardEl.style.display==="none") return;
          var cre = app.creatives[i];
          selection.add(cre.id);
          var cb = cardEl.querySelector(".card-select");
          if(cb) cb.checked = true;
          cardEl.classList.add("selected");
        });
        updateBulkBar();
      });
      galleryBlock.querySelector("#clearSelBtn").addEventListener("click", function(){
        selection.clear();
        gallery.querySelectorAll(".card-select").forEach(function(cb){ cb.checked = false; });
        gallery.querySelectorAll(".card").forEach(function(c){ c.classList.remove("selected"); });
        updateBulkBar();
      });
      galleryBlock.querySelector("#bulkApproveBtn").addEventListener("click", function(){
        if(!selection.size) return;
        app.creatives.forEach(function(c){ if(selection.has(c.id)) c.reviewStatus = "utilizado"; });
        selection.clear();
        save(); renderPanels();
      });
      galleryBlock.querySelector("#bulkRejectBtn").addEventListener("click", function(){
        if(!selection.size) return;
        app.creatives.forEach(function(c){ if(selection.has(c.id)) c.reviewStatus = "rejeitado"; });
        selection.clear();
        save(); renderPanels();
      });

      var rmPausadosBtn = galleryBlock.querySelector("#rmPausadosBtn");

        rmPausadosBtn.addEventListener("click", function(){
          var count = app.creatives.filter(function(c){ return c.status==="pausado"; }).length;
          if(!confirm("Remover "+count+" criativo(s) marcado(s) como Pausado? Não dá pra desfazer.")) return;
          app.creatives = app.creatives.filter(function(c){ return c.status!=="pausado"; });
          save(); renderPanels();
        });
      }

      var batchBtn = galleryBlock.querySelector("#batchDlBtn");
      batchBtn.addEventListener("click", function(){
        var orig = batchBtn.textContent;
        batchBtn.disabled = true; batchBtn.textContent = "Preparando...";
        downloadBatchZip(app).catch(function(err){
          console.error(err); alert("Erro ao preparar os criativos. Tente novamente.");
        }).then(function(){ batchBtn.disabled = false; batchBtn.textContent = orig; });
      });

      var batchSquareBtn = galleryBlock.querySelector("#batchDlSquareBtn");
      batchSquareBtn.addEventListener("click", function(){
        var orig = batchSquareBtn.textContent;
        batchSquareBtn.disabled = true; batchSquareBtn.textContent = "Preparando...";
        downloadBatchZipSquare(app).catch(function(err){
          console.error(err); alert("Erro ao preparar os criativos. Tente novamente.");
        }).then(function(){ batchSquareBtn.disabled = false; batchSquareBtn.textContent = orig; });
      });

      var batchVideoBtn = galleryBlock.querySelector("#batchVideoBtn");
      batchVideoBtn.addEventListener("click", function(){ openBatchVideoModal(app); });

      var batchDlVideosBtn = galleryBlock.querySelector("#batchDlVideosBtn");
      batchDlVideosBtn.addEventListener("click", function(){
        var orig = batchDlVideosBtn.textContent;
        batchDlVideosBtn.disabled = true; batchDlVideosBtn.textContent = "Preparando...";
        downloadVideosZip(app).catch(function(err){
          console.error(err); alert("Erro ao preparar os vídeos. Tente novamente.");
        }).then(function(){ batchDlVideosBtn.disabled = false; batchDlVideosBtn.textContent = orig; });
      });

      var batchGifBtn = galleryBlock.querySelector("#batchGifBtn");
      batchGifBtn.addEventListener("click", function(){ openBatchGifModal(app); });

      var batchDlGifsBtn = galleryBlock.querySelector("#batchDlGifsBtn");
      batchDlGifsBtn.addEventListener("click", function(){
        var orig = batchDlGifsBtn.textContent;
        batchDlGifsBtn.disabled = true; batchDlGifsBtn.textContent = "Preparando...";
        downloadGifsZip(app).catch(function(err){
          console.error(err); alert("Erro ao preparar os GIFs. Tente novamente.");
        }).then(function(){ batchDlGifsBtn.disabled = false; batchDlGifsBtn.textContent = orig; });
      });
    }
    panel.appendChild(galleryBlock);

    // ---- vídeo narrado, também disponível junto dos criativos externos ----
    panel.appendChild(buildNarrationBlock(app, "Ext"));

    // ---- external creatives (importados de fora, só pra gerar vídeo) ----
    var externalBlock = document.createElement("section");
    externalBlock.className = "block";
    externalBlock.innerHTML =
      '<div class="block-head"><span class="block-title">Criativos externos</span>' +
      '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">' +
        '<span class="block-sub">importe uma imagem já pronta (de fora da ferramenta) pra gerar vídeo direto dela, sem passar pelos formatos daqui</span>' +
        (app.externalCreatives.length>0 ? '<button type="button" class="btn-sm" id="extBatchVideoBtn">🎬 Gerar vídeos do lote</button>' : '') +
        (app.externalCreatives.length>0 ? '<button type="button" class="btn-sm" id="extBatchDlVideosBtn">Baixar vídeos (.zip)</button>' : '') +
        (app.externalCreatives.length>0 ? '<button type="button" class="btn-sm" id="extBatchGifBtn">🖼️ Gerar GIFs do lote</button>' : '') +
        (app.externalCreatives.length>0 ? '<button type="button" class="btn-sm" id="extBatchDlGifsBtn">Baixar GIFs (.zip)</button>' : '') +
      '</div></div>' +
      '<input type="file" id="extImportInput" accept="image/*" multiple />' +
      '<div class="external-gallery" id="externalGallery"></div>';
    panel.appendChild(externalBlock);

    var extBatchVideoBtn = externalBlock.querySelector("#extBatchVideoBtn");
    if(extBatchVideoBtn) extBatchVideoBtn.addEventListener("click", function(){ openBatchVideoModalExternal(app); });
    var extBatchDlVideosBtn = externalBlock.querySelector("#extBatchDlVideosBtn");
    if(extBatchDlVideosBtn){
      extBatchDlVideosBtn.addEventListener("click", function(){
        var orig = extBatchDlVideosBtn.textContent;
        extBatchDlVideosBtn.disabled = true; extBatchDlVideosBtn.textContent = "Preparando...";
        downloadVideosZipExternal(app).catch(function(err){
          console.error(err); alert("Erro ao preparar os vídeos. Tente novamente.");
        }).then(function(){ extBatchDlVideosBtn.disabled = false; extBatchDlVideosBtn.textContent = orig; });
      });
    }
    var extBatchGifBtn = externalBlock.querySelector("#extBatchGifBtn");
    if(extBatchGifBtn) extBatchGifBtn.addEventListener("click", function(){ openBatchGifModalExternal(app); });
    var extBatchDlGifsBtn = externalBlock.querySelector("#extBatchDlGifsBtn");
    if(extBatchDlGifsBtn){
      extBatchDlGifsBtn.addEventListener("click", function(){
        var orig = extBatchDlGifsBtn.textContent;
        extBatchDlGifsBtn.disabled = true; extBatchDlGifsBtn.textContent = "Preparando...";
        downloadGifsZipExternal(app).catch(function(err){
          console.error(err); alert("Erro ao preparar os GIFs. Tente novamente.");
        }).then(function(){ extBatchDlGifsBtn.disabled = false; extBatchDlGifsBtn.textContent = orig; });
      });
    }

    function renderExternalGallery(){
      var galleryEl = externalBlock.querySelector("#externalGallery");
      if(!app.externalCreatives.length){
        galleryEl.innerHTML = '<div class="empty">Nenhum criativo externo importado ainda.</div>';
        return;
      }
      galleryEl.innerHTML = "";
      app.externalCreatives.forEach(function(ext){
        var item = document.createElement("div");
        item.className = "ext-item";
        item.innerHTML =
          '<div class="ext-dual-thumbs">' +
            '<div class="ext-thumb-slot" data-slot="story">' +
              (ext.storyImageDataUrl ? '<img src="'+ext.storyImageDataUrl+'" alt="Story" />' : '<div class="ext-thumb-empty">Sem Story</div>') +
              '<label class="ext-thumb-label">Story<input type="file" accept="image/*" class="ext-add-story" /></label>' +
            '</div>' +
            '<div class="ext-thumb-slot" data-slot="feed">' +
              (ext.feedImageDataUrl ? '<img src="'+ext.feedImageDataUrl+'" alt="Feed" />' : '<div class="ext-thumb-empty">Sem Feed</div>') +
              '<label class="ext-thumb-label">Feed<input type="file" accept="image/*" class="ext-add-feed" /></label>' +
            '</div>' +
          '</div>' +
          '<div class="ext-name">'+xmlEscape(ext.name)+'</div>' +
          '<div class="ext-actions">' +
            '<button type="button" class="btn-sm btn-ext-video">🎬 Criar vídeo</button>' +
            '<button type="button" class="btn-sm btn-ext-gif">🖼️ Gerar GIF</button>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">' +
              '<button type="button" class="btn-sm btn-ext-story" title="Baixar Story (1080×1920)">⬇ Story</button>' +
              '<button type="button" class="btn-sm btn-ext-square" title="Baixar Quadrado (1080×1080)">⬇ Quadrado</button>' +
            '</div>' +
            '<button type="button" class="btn-ghost btn-ext-rm" aria-label="Remover criativo externo">✕</button>' +
          '</div>';
        galleryEl.appendChild(item);
        item.querySelector(".btn-ext-video").addEventListener("click", function(){
          var img = externalImageForFormat(ext, app.settings.videoFormat);
          openVideoModal(app, { id: ext.id, hook: ext.name }, img);
        });
        item.querySelector(".btn-ext-gif").addEventListener("click", function(){
          var img = externalImageForFormat(ext, app.settings.videoFormat);
          openGifModal(app, { id: ext.id, hook: ext.name }, img);
        });
        item.querySelector(".btn-ext-story").addEventListener("click", function(){
          downloadExternalAsFormat(ext, STORY_W, STORY_H, "_story", ext.storyImageDataUrl || ext.feedImageDataUrl);
        });
        item.querySelector(".btn-ext-square").addEventListener("click", function(){
          downloadExternalAsFormat(ext, FEED_SQUARE_H, FEED_SQUARE_H, "_quadrado", ext.feedImageDataUrl || ext.storyImageDataUrl);
        });
        item.querySelector(".ext-add-story").addEventListener("change", function(e){
          var file = e.target.files && e.target.files[0];
          if(!file) return;
          fileToDataUrl(file).then(function(url){
            ext.storyImageDataUrl = url; save(); renderPanels();
          });
        });
        item.querySelector(".ext-add-feed").addEventListener("change", function(e){
          var file = e.target.files && e.target.files[0];
          if(!file) return;
          fileToDataUrl(file).then(function(url){
            ext.feedImageDataUrl = url; save(); renderPanels();
          });
        });
        item.querySelector(".btn-ext-rm").addEventListener("click", function(){
          app.externalCreatives = app.externalCreatives.filter(function(e){ return e.id!==ext.id; });
          save(); renderPanels();
        });
      });
    }
    renderExternalGallery();

    externalBlock.querySelector("#extImportInput").addEventListener("change", function(e){
      var files = Array.from(e.target.files||[]);
      if(!files.length) return;
      Promise.all(files.map(function(file){
        return fileToDataUrl(file).then(function(url){
          var baseName = file.name.replace(/\.[^.]+$/, "");
          var parsed = parseExternalFilename(baseName);
          if(parsed.slot) return { offerName: parsed.offerName, slot: parsed.slot, url: url };
          return detectSlotByAspect(url).then(function(slot){
            return { offerName: parsed.offerName, slot: slot, url: url };
          });
        });
      })).then(function(results){
        results.forEach(function(r){
          var existing = app.externalCreatives.filter(function(ex){
            return ex.name.toLowerCase()===r.offerName.toLowerCase();
          })[0];
          if(!existing){
            existing = { id: uid("ext"), name: r.offerName, storyImageDataUrl: null, feedImageDataUrl: null };
            app.externalCreatives.push(existing);
          }
          if(r.slot==="feed") existing.feedImageDataUrl = r.url;
          else existing.storyImageDataUrl = r.url;
        });
        save();
        renderPanels();
      });
    });

    return panel;
  }

  function buildCard(app, cre, onSelectionChange){
    onSelectionChange = onSelectionChange || function(){};
    var selection = getGallerySelection(app.id);
    var card = document.createElement("div");
    card.className = "card" + (selection.has(cre.id) ? " selected" : "");

    var selectWrap = document.createElement("div");
    selectWrap.className = "card-select-wrap";
    var selectCb = document.createElement("input");
    selectCb.type = "checkbox";
    selectCb.className = "card-select";
    selectCb.checked = selection.has(cre.id);
    selectCb.addEventListener("change", function(){
      if(selectCb.checked) selection.add(cre.id); else selection.delete(cre.id);
      card.classList.toggle("selected", selectCb.checked);
      onSelectionChange();
    });
    selectWrap.appendChild(selectCb);
    card.appendChild(selectWrap);

    var reviewBadge = document.createElement("span");
    reviewBadge.className = "card-review-badge rb-"+cre.reviewStatus;
    reviewBadge.textContent = reviewStatusLabel(cre.reviewStatus);
    card.appendChild(reviewBadge);

    var posterWrap = document.createElement("div");
    posterWrap.className = "card-poster";
    posterWrap.innerHTML = buildPosterSVG(app, cre);
    card.appendChild(posterWrap);

    var reviewRow = document.createElement("div");
    reviewRow.className = "review-row";
    if(cre.reviewStatus==="ativo"){
      reviewRow.innerHTML =
        '<button type="button" class="btn-rev-reject">✗ Rejeitar</button>' +
        '<button type="button" class="btn-rev-approve">✓ Aprovar</button>';
      reviewRow.querySelector(".btn-rev-reject").addEventListener("click", function(){
        cre.reviewStatus = "rejeitado"; save(); renderPanels();
      });
      reviewRow.querySelector(".btn-rev-approve").addEventListener("click", function(){
        cre.reviewStatus = "utilizado"; save(); renderPanels();
      });
    } else {
      reviewRow.innerHTML = '<button type="button" class="btn-rev-undo">↩ Devolver para Ativos</button>';
      reviewRow.querySelector(".btn-rev-undo").addEventListener("click", function(){
        cre.reviewStatus = "ativo"; save(); renderPanels();
      });
    }
    card.appendChild(reviewRow);

    var statusRow = document.createElement("div");
    statusRow.className = "status-row";
    statusRow.innerHTML = '<select class="status-select st-'+cre.status+'">' +
      CREATIVE_STATUSES.map(function(s){ return '<option value="'+s+'"'+(cre.status===s?" selected":"")+'>'+creativeStatusLabel(s)+'</option>'; }).join("") +
      '</select>';
    card.appendChild(statusRow);
    statusRow.querySelector("select").addEventListener("change", function(e){
      cre.status = e.target.value; save();
      e.target.className = "status-select st-"+cre.status;
    });

    var otherApps = state.apps.filter(function(a){ return a.id!==app.id; });
    if(otherApps.length){
      var copyRow = document.createElement("div");
      copyRow.className = "copy-row";
      copyRow.innerHTML =
        '<select class="copy-target">' +
          otherApps.map(function(a){ return '<option value="'+a.id+'">'+xmlEscape(a.name)+'</option>'; }).join("") +
        '</select>' +
        '<button type="button" class="btn-sm btn-copy-app">Copiar pra lá →</button>';
      card.appendChild(copyRow);
      copyRow.querySelector(".btn-copy-app").addEventListener("click", function(){
        var targetId = copyRow.querySelector(".copy-target").value;
        var targetApp = state.apps.filter(function(a){ return a.id===targetId; })[0];
        if(!targetApp) return;
        if(targetApp.creatives.length>=MAX_CREATIVES){
          alert('"'+targetApp.name+'" já está no limite de '+MAX_CREATIVES+' criativos.');
          return;
        }
        var newColor = nextColor(targetApp);
        var newLayout = nextLayout(targetApp);
        targetApp.creatives.push(seedCreative(cre.hook, cre.corpo, cre.valor, cre.cta, cre.photo, newColor, "", newLayout));
        save();
        alert('Copiado para "'+targetApp.name+'"!');
        renderPanels();
      });
    }

    var videoRow = document.createElement("div");
    videoRow.className = "video-row";
    videoRow.innerHTML =
      '<button type="button" class="btn-sm btn-video" title="Criar vídeo (até 60s, com narração)">🎬 Vídeo</button>' +
      '<button type="button" class="btn-sm btn-gif" title="Gerar GIF animado (sem áudio)">🖼️ GIF</button>';
    card.appendChild(videoRow);
    videoRow.querySelector(".btn-video").addEventListener("click", function(){
      openVideoModal(app, cre);
    });
    videoRow.querySelector(".btn-gif").addEventListener("click", function(){
      openGifModal(app, cre);
    });

    var foot = document.createElement("div");
    foot.className = "card-foot";
    foot.innerHTML =
      '<button type="button" class="btn-dl" title="Baixar Story (1080×1920)">⬇ Story</button>' +
      '<button type="button" class="btn-dl-square" title="Baixar Quadrado (1080×1080)">⬇ Quadrado</button>' +
      '<div class="row-span2">' +
        '<button type="button" class="btn-dup" title="Duplicar (nova cor)">Duplicar</button>' +
        '<button type="button" class="btn-edit">Editar</button>' +
        '<button type="button" class="btn-ghost btn-rm" aria-label="Remover criativo">✕</button>' +
      '</div>';
    card.appendChild(foot);

    var editPanel = document.createElement("div");
    editPanel.className = "edit-panel";
    var paletteDots = PALETTE.map(function(c){
      return '<span class="palette-dot'+(cre.color===c?" active":"")+'" data-c="'+c+'" style="background:'+c+'"></span>';
    }).join("");
    var thumbPicks = '<div class="thumb-pick none'+(cre.photo?"":" active")+'" data-photo="" title="Sem foto">✕</div>' +
      app.photoLibrary.map(function(url){
        return '<div class="thumb-pick'+(cre.photo===url?" active":"")+'" data-photo="'+encodeURIComponent(url)+'"><img src="'+url+'" /></div>';
      }).join("");
    editPanel.innerHTML =
      '<div><label>Hook</label><textarea rows="2" class="e-hook">'+xmlEscape(cre.hook)+'</textarea></div>' +
      '<div><label>Corpo</label><textarea rows="3" class="e-corpo">'+xmlEscape(cre.corpo)+'</textarea></div>' +
      '<div><label>Valor</label><input class="e-valor" value="'+xmlEscape(cre.valor)+'" /></div>' +
      '<div><label>CTA</label><input class="e-cta" value="'+xmlEscape(cre.cta)+'" /></div>' +
      '<div><label>'+(app.settings.visualType==="cash"?"Texto no dinheiro":"Nome no cartão")+'</label><input class="e-cardname" placeholder="'+xmlEscape(app.name)+'" value="'+xmlEscape(cre.cardName||"")+'" /></div>' +
      '<div class="compliance-warn e-compliance-warn" style="display:none"></div>' +
      '<div><label>Formato do layout</label><select class="e-layout">' +
        LAYOUTS.map(function(l){ return '<option value="'+l+'"'+(cre.layout===l?" selected":"")+'>'+layoutLabel(l)+'</option>'; }).join("") +
      '</select></div>' +
      '<div><label>Cor</label><div class="edit-color-row">'+paletteDots+'<input type="color" class="e-color-custom" value="'+cre.color+'" /></div></div>' +
      '<div><label>Foto</label><div class="edit-photo-row">'+thumbPicks+'<input type="file" class="e-photo-new" accept="image/*" /></div></div>' +
      '<div class="e-photo-controls" style="display:'+(cre.photo?"flex":"none")+';flex-direction:column;gap:6px">' +
        '<div class="slider-row"><label>Zoom</label><input type="range" class="e-zoom" min="100" max="250" value="'+cre.photoZoom+'" /><span class="sval e-zoom-val">'+cre.photoZoom+'%</span></div>' +
        '<div class="slider-row"><label>Posição X</label><input type="range" class="e-offx" min="-50" max="50" value="'+cre.photoOffsetX+'" /><span class="sval e-offx-val">'+cre.photoOffsetX+'</span></div>' +
        '<div class="slider-row"><label>Posição Y</label><input type="range" class="e-offy" min="-50" max="50" value="'+cre.photoOffsetY+'" /><span class="sval e-offy-val">'+cre.photoOffsetY+'</span></div>' +
      '</div>';
    card.appendChild(editPanel);

    function refreshPoster(){ posterWrap.innerHTML = buildPosterSVG(app, cre); }

    foot.querySelector(".btn-dl").addEventListener("click", function(){
      var idx0 = app.creatives.indexOf(cre)+1;
      downloadPng(buildPosterSVG(app, cre), creativeFilename(app, cre, idx0));
    });
    foot.querySelector(".btn-dl-square").addEventListener("click", function(){
      var idx0 = app.creatives.indexOf(cre)+1;
      var name = creativeFilename(app, cre, idx0).replace(/\.png$/, "_quadrado.png");
      downloadPng(buildFeedSquareSVG(app, cre), name, FEED_SQUARE_H, FEED_SQUARE_H);
    });
    foot.querySelector(".btn-dup").addEventListener("click", function(){
      if(app.creatives.length>=MAX_CREATIVES) return;
      var idx = app.creatives.indexOf(cre);
      var clone = seedCreative(cre.hook, cre.corpo, cre.valor, cre.cta, cre.photo, nextColor(app), cre.cardName, nextLayout(app));
      clone.photoZoom = cre.photoZoom; clone.photoOffsetX = cre.photoOffsetX; clone.photoOffsetY = cre.photoOffsetY;
      app.creatives.splice(idx+1, 0, clone);
      save(); renderPanels();
    });
    foot.querySelector(".btn-edit").addEventListener("click", function(){
      editPanel.classList.toggle("open");
    });
    foot.querySelector(".btn-rm").addEventListener("click", function(){
      app.creatives = app.creatives.filter(function(c){ return c.id!==cre.id; });
      save(); renderPanels();
    });

    var eComplianceWarn = editPanel.querySelector(".e-compliance-warn");
    function updateCardCompliance(){
      var hits = findComplianceHits(cre.hook+" "+cre.corpo+" "+(cre.cardName||""));
      if(hits.length){
        eComplianceWarn.style.display = "block";
        eComplianceWarn.innerHTML = "⚠️ <strong>Atenção:</strong> referência a \""+hits.map(xmlEscape).join('", "')+"\" — risco de banimento/publicidade enganosa.";
      } else {
        eComplianceWarn.style.display = "none";
        eComplianceWarn.innerHTML = "";
      }
    }
    updateCardCompliance();

    editPanel.querySelector(".e-hook").addEventListener("input", function(e){ cre.hook=e.target.value; save(); refreshPoster(); updateCardCompliance(); });
    editPanel.querySelector(".e-corpo").addEventListener("input", function(e){ cre.corpo=e.target.value; save(); refreshPoster(); updateCardCompliance(); });
    editPanel.querySelector(".e-valor").addEventListener("input", function(e){ cre.valor=e.target.value; save(); refreshPoster(); });
    editPanel.querySelector(".e-cta").addEventListener("input", function(e){ cre.cta=e.target.value; save(); refreshPoster(); });
    editPanel.querySelector(".e-cardname").addEventListener("input", function(e){ cre.cardName=e.target.value; save(); refreshPoster(); updateCardCompliance(); });
    editPanel.querySelector(".e-layout").addEventListener("change", function(e){ cre.layout=e.target.value; save(); refreshPoster(); });
    editPanel.querySelectorAll(".palette-dot").forEach(function(dot){
      dot.addEventListener("click", function(){
        cre.color = dot.dataset.c; save(); refreshPoster();
        editPanel.querySelectorAll(".palette-dot").forEach(function(d){ d.classList.toggle("active", d.dataset.c===cre.color); });
        editPanel.querySelector(".e-color-custom").value = cre.color;
      });
    });
    editPanel.querySelector(".e-color-custom").addEventListener("input", function(e){
      cre.color = e.target.value; save(); refreshPoster();
      editPanel.querySelectorAll(".palette-dot").forEach(function(d){ d.classList.remove("active"); });
    });

    var controlsBox = editPanel.querySelector(".e-photo-controls");
    editPanel.querySelectorAll(".thumb-pick").forEach(function(tp){
      tp.addEventListener("click", function(){
        var v = tp.dataset.photo;
        cre.photo = v ? decodeURIComponent(v) : null;
        save(); refreshPoster();
        controlsBox.style.display = cre.photo ? "flex" : "none";
        editPanel.querySelectorAll(".thumb-pick").forEach(function(d){ d.classList.toggle("active", d===tp); });
      });
    });
    editPanel.querySelector(".e-photo-new").addEventListener("change", function(e){
      var file = e.target.files && e.target.files[0];
      if(!file) return;
      fileToDataUrl(file).then(function(url){
        app.photoLibrary.push(url);
        cre.photo = url; save(); refreshPoster(); renderPanels();
      });
    });
    var zoomEl = editPanel.querySelector(".e-zoom"), offxEl = editPanel.querySelector(".e-offx"), offyEl = editPanel.querySelector(".e-offy");
    zoomEl.addEventListener("input", function(){ cre.photoZoom=+zoomEl.value; editPanel.querySelector(".e-zoom-val").textContent=zoomEl.value+"%"; save(); refreshPoster(); });
    offxEl.addEventListener("input", function(){ cre.photoOffsetX=+offxEl.value; editPanel.querySelector(".e-offx-val").textContent=offxEl.value; save(); refreshPoster(); });
    offyEl.addEventListener("input", function(){ cre.photoOffsetY=+offyEl.value; editPanel.querySelector(".e-offy-val").textContent=offyEl.value; save(); refreshPoster(); });

    return card;
  }

  // ---- export / import data ----
  function showJsonDownloadModal(blob, filename){
    var url = URL.createObjectURL(blob);
    var overlay = document.createElement("div");
    overlay.className = "dl-overlay";
    overlay.innerHTML =
      '<div class="dl-box">' +
        '<p style="margin-top:0">Backup pronto (' + filename + ') — guarda esse arquivo num lugar seguro. Ele tem todos os apps, criativos e fotos.</p>' +
        '<div class="dl-actions">' +
          '<a href="'+url+'" download="'+filename+'" target="_blank" rel="noopener" class="btn-primary">Baixar backup (.json)</a>' +
          '<button type="button" class="dl-close">Fechar</button>' +
        '</div>' +
        '<p class="hint" style="margin-top:14px"><strong>Clique normal pode não baixar.</strong> Clique com o botão direito no link acima e escolha "Abrir link em nova janela" (ou "em nova aba") — é o jeito que funciona.</p>' +
      '</div>';
    document.body.appendChild(overlay);
    function close(){ overlay.remove(); document.removeEventListener("keydown", onKey); URL.revokeObjectURL(url); }
    function onKey(e){ if(e.key==="Escape") close(); }
    overlay.addEventListener("click", function(e){ if(e.target===overlay) close(); });
    overlay.querySelector(".dl-close").addEventListener("click", close);
    document.addEventListener("keydown", onKey);
  }

  function triggerExportBackup(){
    var json = JSON.stringify(state, null, 2);
    var blob = new Blob([json], { type: "application/json" });
    var stamp = new Date().toISOString().slice(0,10);
    showJsonDownloadModal(blob, "fabrica-criativos-backup_"+stamp+".json");
  }

  var importInput = document.getElementById("importDataInput");
  function triggerImportBackup(){ importInput.click(); }
  importInput.addEventListener("change", function(e){
    var file = e.target.files && e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      var parsed;
      try{ parsed = JSON.parse(reader.result); }catch(err){
        alert("Arquivo inválido — não é um JSON válido."); importInput.value=""; return;
      }
      if(!parsed || !Array.isArray(parsed.apps)){
        alert("Arquivo não parece ser um backup desta ferramenta (faltando 'apps')."); importInput.value=""; return;
      }
      if(!confirm("Importar vai substituir TODOS os apps e criativos atuais por este backup. Tem certeza?")){
        importInput.value=""; return;
      }
      state = parsed;
      if(!state.activeId && state.apps[0]) state.activeId = state.apps[0].id;
      save();
      importInput.value="";
      render();
      alert("Backup importado com sucesso.");
    };
    reader.onerror = function(){ alert("Não foi possível ler o arquivo."); };
    reader.readAsText(file);
  });

  // ---- theme ----
  var THEME_KEY = "creative-factory-theme";
  var themeBtn = document.getElementById("themeToggle");
  function applyTheme(theme){
    document.body.dataset.theme = theme;
    themeBtn.textContent = theme === "light" ? "☀" : "☾";
    try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
  }
  var savedTheme = "dark";
  try{ savedTheme = localStorage.getItem(THEME_KEY) || "dark"; }catch(e){}
  applyTheme(savedTheme);
  themeBtn.addEventListener("click", function(){
    applyTheme(document.body.dataset.theme === "light" ? "dark" : "light");
  });

  document.getElementById("notifBtn").addEventListener("click", function(){
    alert("Nenhuma notificação por enquanto.");
  });
  document.getElementById("railLogoutBtn").addEventListener("click", function(){
    alert("Login/logout ainda não está conectado — essa é uma versão local, sem conta.");
  });
  document.getElementById("railUserName").textContent = "Minha conta";

  document.getElementById("projectSelectBtn").addEventListener("click", function(){
    var dd = document.getElementById("projectDropdown");
    dd.style.display = dd.style.display==="none" ? "block" : "none";
  });
  document.addEventListener("click", function(e){
    var wrap = document.querySelector(".rail-project-select");
    var dd = document.getElementById("projectDropdown");
    if(wrap && !wrap.contains(e.target)) dd.style.display = "none";
  });

  render();
})();
</script>
